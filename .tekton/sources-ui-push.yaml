apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/sources-ui?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://raw.githubusercontent.com/RedHatInsights/konflux-pipelines/refs/heads/main/pipelines/platform-ui/docker-build-run-all-tests.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: sources-ui
    appstudio.openshift.io/component: sources-ui
    pipelines.appstudio.openshift.io/type: build
  name: sources-ui-on-push
  namespace: rh-platform-experien-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/sources-ui/sources-ui:{{revision}}
  - name: dockerfile
    value: ./build-tools/Dockerfile
  - name: path-context
    value: .
  - name: rebuild
    value: "true"
  - name: test-app-name
    value: sources-ui
  - name: test-app-port
    value: "8000"
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex

      npm install
      npm run lint
      npm test --  --runInBand --no-cache
  - name: run-app-script
    value: |
      #!/bin/sh
      # Script that runs the test application with Caddy using ConfigMap-mounted Caddyfile

      set -e

      echo "Starting application with Caddy using ConfigMap Caddyfile..."
      exec caddy run --config /etc/caddy/Caddyfile
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex

      timeout 120s bash -c 'until curl -k https://stage.foo.redhat.com:1337 > /dev/null 2>&1; do
        echo "Waiting for dev server to be ready"
        sleep 5
      done'
      echo "Dev server ready!"

      echo "Installing Playwright browsers..."
      npm run playwright -- install --with-deps

      echo "Running Playwright tests ..."
      npm run playwright -- test
  - name: e2e-credentials-secret
    value: sources-ui-credentials-secret
  - name: frontend-proxy-routes-configmap
    value: sources-ui-dev-proxy-caddyfile
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/RedHatInsights/konflux-pipelines
    - name: revision
      value: main
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-sources-ui
  taskRunSpecs:
    - pipelineTaskName: run-e2e-tests
      serviceAccountName: build-pipeline-sources-ui
      podTemplate:
        # Override /etc/hosts to redirect stage.foo.redhat.com to localhost
        hostAliases:
          - ip: "::1"
            hostnames:
              - "stage.foo.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "stage.foo.redhat.com"
        # Add ConfigMap volume for test app Caddyfile
        volumes:
          - name: test-app-caddyfile
            configMap:
              name: sources-ui-test-app-caddyfile
      sidecarSpecs:
        # Mount test app Caddyfile into run-application sidecar
        - name: run-application
          volumeMounts:
            - name: test-app-caddyfile
              mountPath: /etc/caddy
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
